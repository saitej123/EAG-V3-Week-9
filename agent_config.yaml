# DAG skill catalogue — one Skill class, many yaml entries.
skills:
  planner:
    prompt: prompts/planner.md
    tools: []
    temperature: 0.4
    max_tokens: 4096
    extends_graph: true
    provider: gemini

  researcher:
    prompt: prompts/researcher.md
    tools: [web_search, fetch_url, fetch_urls, gemini_live_search]
    temperature: 0.7
    max_tokens: 4096
    provider: gemini

  retriever:
    prompt: prompts/retriever.md
    tools: [search_knowledge, read_file]
    temperature: 0.3
    max_tokens: 4096
    provider: gemini

  distiller:
    prompt: prompts/distiller.md
    tools: []
    temperature: 0.1
    max_tokens: 2048
    critic: true
    provider: gemini

  summariser:
    prompt: prompts/summariser.md
    tools: []
    temperature: 0.3
    max_tokens: 2048
    provider: gemini

  critic:
    prompt: prompts/critic.md
    tools: [validate_json_keys, count_syllables]
    temperature: 0.0
    max_tokens: 1024
    provider: gemini

  calculator:
    prompt: prompts/calculator.md
    tools: [safe_calculate]
    temperature: 0.0
    max_tokens: 1024
    provider: gemini

  prosody_analyst:
    prompt: prompts/prosody_analyst.md
    tools: [count_syllables]
    temperature: 0.0
    max_tokens: 2048
    provider: gemini

  formatter:
    prompt: prompts/formatter.md
    tools: []
    temperature: 0.3
    max_tokens: 4096
    terminal: true
    provider: gemini

  coder:
    prompt: prompts/coder.md
    tools: []
    temperature: 0.2
    max_tokens: 4096
    internal_successors: [sandbox_executor]
    provider: gemini

  sandbox_executor:
    prompt: prompts/sandbox_executor.md
    tools: []
    temperature: 0.0
    max_tokens: 256
    provider: gemini

  browser:
    prompt: prompts/browser.md
    description: >
      Fetches and interacts with web pages through a Playwright cascade
      (extract → render → agent → deterministic → a11y → vision).
      Node metadata: url (required), goal (required), optional min_browser_actions,
      query_id, force_path (opt-in: debug one layer or rare vision-from-screenshot).
      Returns BrowserOutput with path, content, actions,
      page_state_logs, and cost fields. Persisted under state/sessions/.
      Use when Researcher fetch_url is insufficient: JS-rendered pages,
      interactive widgets, multi-step workflows. On failure, orchestrator may
      queue Researcher (gemini_live_search) instead of replanning Browser.
    tools: []
    temperature: 0.5
    max_tokens: 4096
    provider: gemini
